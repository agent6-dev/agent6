name: pypi

# Publishes to PyPI via Trusted Publishing (OpenID Connect) on release.
# Reuses the amd64 + arm64 wheels + the sdist built by build.yml. No API
# tokens stored.
#
# One-time PyPI setup: configure a Trusted Publisher for the `agent6`
# project pointing at this repository + workflow + environment "pypi".

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    name: publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/agent6
    permissions:
      id-token: write  # required for OIDC token exchange
    steps:
      - name: Download every arch's wheel + the sdist
        # build.yml uploads one artifact per arch (agent6-dist-amd64 /
        # agent6-dist-arm64); merge them into a single dist/ for upload.
        uses: actions/download-artifact@v8
        with:
          pattern: agent6-dist-*
          merge-multiple: true
          path: dist/

      - name: Sanity-check artifacts (both arch wheels + the sdist)
        run: |
          ls -la dist/
          test "$(ls dist/agent6-*.whl 2>/dev/null | wc -l)" -ge 2
          test -n "$(ls dist/agent6-*.tar.gz 2>/dev/null)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          # No password / token: Trusted Publishing exchanges the GitHub
          # OIDC token for a short-lived PyPI upload token.
