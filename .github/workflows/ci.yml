name: ci

# Lints, type-checks, and tests against the EXACT wheel produced by
# build.yml (which has agent6-jail bundled inside it), so CI never tests
# a freshly-rebuilt-from-source variant.

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml

  verify:
    name: ruff + pyright + tach + pytest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dev environment
        run: uv sync --all-extras --dev

      - name: Download built wheel
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.build.outputs.wheel_artifact }}
          path: dist/

      - name: Install the built wheel into the env
        run: |
          wheel=$(ls dist/agent6-*.whl)
          uv pip install --reinstall "$wheel"

      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pyright
      - run: uv run tach check
      - run: uv run pytest -ra

  sandbox-smoke:
    name: agent6 check sandbox
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Download built wheel
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.build.outputs.wheel_artifact }}
          path: dist/

      - name: Install the wheel as a CLI tool
        run: |
          wheel=$(ls dist/agent6-*.whl)
          uv tool install "$wheel"

      - name: Allow unprivileged user namespaces (Ubuntu 24.04 AppArmor)
        # Since Ubuntu 23.10 the default AppArmor policy blocks
        # unprivileged userns creation, which makes agent6's `strict`
        # sandbox profile fail with `uid_map: Operation not permitted`.
        # The GitHub Actions ubuntu-24.04 runner image carries this
        # restriction; relax it so check sandbox can actually exercise
        # the strict path the rest of the world will use.
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: agent6 check sandbox
        run: agent6 check sandbox
