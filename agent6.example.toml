# Example configuration for agent6. Copy to agent6.toml and edit.
# Every field is REQUIRED. Missing fields cause `agent6 check-config` to fail.

[agent6]
config_version = 1

# =============================================================================
# Providers
# =============================================================================
# Each [providers.<name>] block declares ONE backend you can call. The
# table key (<name>) is yours to pick — you reference it from
# [models.<role>] below. Configure as many as you want; at least one is
# required, and every role must route to one that exists.
#
# Two `kind`s are supported:
#   - "anthropic"      → the Anthropic Messages endpoint.
#   - "openai"  → any OpenAI Chat Completions-compatible endpoint
#                        (OpenAI itself, OpenRouter, Ollama, vLLM, LM
#                        Studio, llama.cpp's server, etc.). Each separate
#                        endpoint gets its OWN [providers.<name>] block
#                        with its own api_key_env / base_url — that's how
#                        you run OpenAI and OpenRouter side-by-side.

[providers.anthropic]
kind = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
prompt_caching = true
# per-HTTP-call timeout (connect + read) in seconds. Default 600.
# Lower this on benches where you want a stuck provider to fail fast.
# http_timeout_s = 600.0

# OpenAI proper:
# [providers.openai]
# kind = "openai"
# api_key_env = "OPENAI_API_KEY"

# OpenRouter (proxy to ~100 models incl. Llama 3, Mixtral, DeepSeek):
# [providers.openrouter]
# kind = "openai"
# api_key_env = "OPENROUTER_API_KEY"
# base_url = "https://openrouter.ai/api/v1"
# extra_headers = { "HTTP-Referer" = "https://github.com/you/your-repo", "X-Title" = "agent6" }
# Reasoning models on OpenRouter sometimes stall; bump the per-HTTP-call timeout:
# http_timeout_s = 1200.0

# Ollama (local, no auth — omit api_key_env entirely):
# [providers.ollama]
# kind = "openai"
# base_url = "http://localhost:11434/v1"

# vLLM / LM Studio / llama.cpp server, etc.:
# [providers.local]
# kind = "openai"
# base_url = "http://localhost:8000/v1"

# =============================================================================
# Role routing
# =============================================================================
# Pick which provider (by table-key name above) and which model serves each
# Two live roles:
#
#   worker   -> drives `agent6 run` / `agent6 resume`; its model's pricing also
#               drives the USD-to-token budget conversion.
#   reviewer -> used by the one-shot `agent6 review` subcommand.
#
# Any provider may serve either role; cross-vendor mixes work fine
# (e.g. anthropic worker + openrouter reviewer).

[models.worker]
provider = "anthropic"
model = "claude-sonnet-4-5"
# Sampling temperature, pinned per call. Defaults to 0.0 — agent6's
# tool-use loop is a feedback loop and high-temperature sampling causes
# observable degeneration on some open-weights models (caught
# Kimi K2.6 looping on `\n` escapes until it hit the completion-tokens
# cap). Anthropic / OpenAI flagships are tuned to behave at any
# temperature; OpenRouter routes to provider defaults that vary.
# Override only if you specifically want the model's default behaviour.
# temperature = 0.0

[models.reviewer]
provider = "anthropic"
model = "claude-opus-4-5"
# temperature = 0.0

[sandbox]
# "auto"     picks the strongest profile this kernel + container can run.
# "strict"   = user/mount/pid/ipc/uts/net namespaces + pivot_root + landlock
#              + seccomp + capset(0) + rlimits + NO_NEW_PRIVS.
#              `agent6 run` REFUSES to start if 'strict' is asked for but the
#              host blocks unprivileged user namespaces.
# "hardened" = no namespaces, but still landlock + seccomp + capset(0) +
#              rlimits + NO_NEW_PRIVS. Works under default-seccomp Docker.
profile = "auto"
# "no" | "provider_only" | "allow"
# "provider_only" allows the host endpoints of every configured provider.
network = "provider_only"
# "yes" | "no" | "ask"
run_commands = "ask"
# Re-bind .git/ READ-ONLY (or, in hardened, switch Landlock to a
# carve-out granting RW to every top-level cwd entry EXCEPT .git/) so
# that a worker which obtains run_command (run_commands = "yes" /
# "ask" + approval) cannot `rm -rf .git`, force a reset, or otherwise
# corrupt the repository from inside a child process. The workflow's
# own commits go through git_ops.py from the agent process (outside
# the jail) and are unaffected. Hardened-mode caveat: writes to NEW
# top-level entries created at the cwd root after launch are denied;
# anything inside an existing top-level dir (src/, tests/, ...) is
# unaffected. Set false only if your verify_command needs to write to
# .git (uncommon).
protect_git = true
# Same idea, for agent6.toml + the .agent6/ run directory (transcripts,
# graph state, logs). The curator subprocess has its own jail policy
# granting it write access to .agent6/; worker children do not.
protect_agent6 = true

[git]
require_clean_worktree = true
auto_stash = false
# When true, each run cuts a fresh `agent6/<slug>` branch off HEAD. When
# false, agent6 stays on the current branch and just remembers the
# starting sha (so `commit_strategy` finalization can still rewind).
branch_per_run = true
# All strategies commit once per plan step during the run — that's what
# gives the reviewer clean per-step diffs and lets resume pick up after
# a crash. The strategy only governs end-of-run FINALIZATION:
#
# "per_step" → leave the per-step commits as the final history.
#              Best for blame + bisect, produces N commits.
# "squash"   → soft-reset the branch back to the run's starting sha and
#              produce ONE combined commit listing every step. The
#              per-step commits remain reachable via reflog for recovery.
# "stage"    → soft-reset only: changes are left staged for you to
#              inspect and commit (or split) by hand.
# "none"     → mixed-reset: changes land in the worktree unstaged. You
#              review `git diff` and commit (or discard) manually.
commit_strategy = "per_step"
allow_push = false
allow_force = false
allow_history_rewrite = false

# Optional commit identity overrides. All three fields default to None, in
# which case agent6 honors the project's existing `git config user.name` /
# `user.email`. If neither an override nor a usable git config is present,
# `agent6 run` refuses to start (it will not silently commit as an empty
# identity).
#
# Use `coauthor` to tag commits with the human operator's name, e.g.
# `coauthor = "Alice <alice@example.com>"` appends a `Co-authored-by:` trailer.
# [git.commit]
# name = "agent6"
# email = "agent6@local"
# coauthor = "Alice <alice@example.com>"

[workflow]
# What "step succeeded" means. Required.
verify_command = ["uv", "run", "pytest", "-x"]

# Optional. critic-in-loop. When != "off", the workflow runs the
# `reviewer` model as a critic at the chosen trigger and shows its
# verdict to the worker on the next turn. Modes:
#   "off"            - default; the worker runs solo.
#   "on_verify_fail" - critique after every verify failure.
#   "before_finish"  - intercept finish_run; if critic says NEEDS_WORK
#                      the finish is revoked and the loop continues.
#   "periodic"       - run every `critic_period` iterations.
# critic = "off"
# critic_period = 10

# Optional. prompt-revision pass. When enabled, the `reviewer`
# model gets one no-tools call before the worker loop to rewrite a raw
# task into a clearer task spec. The original task is still included as
# authoritative context so intent drift is visible.
#   "off"         - default; no revision.
#   "auto"        - revise, print before/after, then proceed.
#   "interactive" - revise, then prompt to accept/edit/use original.
# revise_prompt = "off"

[budget]
# Hard stop. When either ceiling is reached the run aborts with exit code 3.
# The run is resumable: bump the limit and `agent6 run --resume <run-id>`.
max_input_tokens = 2000000
max_output_tokens = 200000

# =============================================================================
# Notify hook
# =============================================================================
# Optional. When `on_complete` is non-empty, agent6 runs this argv after
# `agent6 run` or `agent6 resume` finishes (success OR failure), outside
# the jail, with the following env vars set:
#   AGENT6_RUN_ID    - run id (e.g. 20251104-abc123)
#   AGENT6_RUN_DIR   - absolute path to the run directory
#   AGENT6_RUN_OK    - "1" on success, "0" on any non-success reason
#   AGENT6_RUN_REASON- e.g. "silent_finish" | "max_iterations" | "provider_error"
# argv is operator-controlled (no LLM input), but the hook still runs as
# your user — only put things you'd type at your own shell here.
# [notify]
# on_complete = ["notify-send", "agent6", "run finished"]
# timeout_s = 30.0

# =============================================================================
# MCP (Model Context Protocol) servers
# =============================================================================
# Optional. Each entry under [[mcp.servers]] is a long-lived subprocess
# agent6 spawns at run start. It speaks JSON-RPC 2.0 over stdio (the MCP
# spec). Tools the server advertises become available to the LLM as
# `mcp__<name>__<tool>` and route through the normal tool surface.
#
# Trust model: each server runs as YOUR user, OUTSIDE the agent6 jail.
# The `command` is operator-controlled (never LLM-influenced), same as
# `notify.on_complete`. The LLM CAN influence the *arguments* sent to
# `tools/call`, so each MCP server is its own tool surface to audit -
# vet it as carefully as you'd vet a `run_command` allow-list.
#
# A misbehaving server (crash, hang, malformed JSON) surfaces as a
# clean tool failure and the agent keeps running.
# [mcp]
# enabled = true
#
# [[mcp.servers]]
# name = "fs"                                  # appears as mcp__fs__<tool>
# command = ["uvx", "mcp-server-filesystem", "/tmp/sandbox"]
# enabled = true
# startup_timeout_s = 10.0
# call_timeout_s = 60.0
