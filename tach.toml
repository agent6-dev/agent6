# tach module-boundary configuration.
# Enforces the dependency graph declared in the plan.

exclude = [
  "**/.venv/**",
  "**/tests/**",
  "**/target/**",
]
source_roots = ["src"]
exact = true
forbid_circular_dependencies = true

[[modules]]
path = "agent6"
depends_on = []

[[modules]]
path = "agent6.cli"
depends_on = [
  "agent6.config",
  "agent6.config_io",
  "agent6.config_layer",
  "agent6.models_cache",
  "agent6.paths",
  "agent6.pricing",
  "agent6.secrets",
  "agent6.detect",
  "agent6.sandbox",
  "agent6.workflows",
  "agent6.types",
  "agent6.providers", "agent6", "agent6.tools",
  "agent6.memory",
  "agent6.budget",
  "agent6.events",
  "agent6.git_ops",
  "agent6.init",
  "agent6.tui",
  "agent6.web",
  "agent6.frontend",
  "agent6.viewmodel",
  "agent6.graph.client",
  "agent6.graph.models",
  "agent6.graph.storage",
  "agent6.run_id",
  "agent6.mcp_server",
  "agent6.machine",
  "agent6.verify_infer",
  "agent6.transcript_render",
]

[[modules]]
path = "agent6.workflows"
depends_on = [
  "agent6.agents",
  "agent6.tools",
  "agent6.tools.schema",
  "agent6.git_ops",
  "agent6.types",
  "agent6.config",
  "agent6.providers",
  "agent6.budget",  # loop workflow needs BudgetExceeded
  "agent6.graph.client",
  "agent6.graph.models",
]

[[modules]]
path = "agent6.agents"
depends_on = [
  "agent6.providers",
]

[[modules]]
path = "agent6.providers"
depends_on = ["agent6.budget"]

[[modules]]
path = "agent6.events"
depends_on = []

[[modules]]
path = "agent6.tui"
depends_on = ["agent6.config_layer", "agent6.frontend", "agent6.machine", "agent6.models_cache", "agent6.paths", "agent6.secrets", "agent6.transcript_render", "agent6.viewmodel"]

[[modules]]
# The shared, textual-free write bridge: spawn the CLI detached, and the
# approval / question / steer answer-file contract the workflow process polls.
# Consumed by the CLI, the TUI, and the web server. Pure stdlib, no UI toolkit.
path = "agent6.frontend"
depends_on = []

[[modules]]
# The web UI: a stdlib HTTP server + one embedded page. Renders the shared
# view-model folds (viewmodel), the effective config (config_layer), and the
# conversation (transcript_render), reading run/machine dirs it locates via the
# machine spec/journal. The write side drives the frontend bridge. No UI toolkit.
path = "agent6.web"
depends_on = [
  "agent6",
  "agent6.viewmodel",
  "agent6.frontend",
  "agent6.config",
  "agent6.config_layer",
  "agent6.transcript_render",
  "agent6.machine",
]

[[modules]]
# The shared view-model: a run's logs.jsonl folded into RunState, a machine's
# journal folded into MachineState. Consumed by the TUI, the CLI watchers, and
# (later) the web UI. The machine fold reads the journal event types + the spec,
# so it depends on those two leaf machine modules; nothing UI-toolkit-shaped.
path = "agent6.viewmodel"
depends_on = ["agent6.machine.journal", "agent6.machine.model"]

[[modules]]
path = "agent6.init"
depends_on = ["agent6.config_layer", "agent6.verify_infer"]

[[modules]]
path = "agent6.verify_infer"
depends_on = []

[[modules]]
path = "agent6.transcript_render"
depends_on = []

[[modules]]
path = "agent6.budget"
depends_on = ["agent6.pricing"]

[[modules]]
path = "agent6.pricing"
depends_on = ["agent6.paths"]

[[modules]]
path = "agent6.sandbox"
depends_on = [ "agent6.types"]

[[modules]]
path = "agent6.tools"
# Dispatch.py drives the curator over a GraphClient (graph.client) using the
# graph.models intent types, for the DAG-as-tool handlers (add_task /
# update_task / set_cursor / list_tasks).
depends_on = ["agent6.tools.schema", "agent6.sandbox", "agent6.types", "agent6.config", "agent6.events", "agent6.graph.client", "agent6.graph.models"]

[[modules]]
path = "agent6.tools.schema"
depends_on = []

[[modules]]
path = "agent6.git_ops"
depends_on = ["agent6.types"]

[[modules]]
path = "agent6.config"
depends_on = ["agent6.budget"]

[[modules]]
path = "agent6.paths"
depends_on = []

[[modules]]
path = "agent6.secrets"
depends_on = ["agent6.paths"]

[[modules]]
path = "agent6.config_io"
depends_on = ["agent6.config"]

[[modules]]
path = "agent6.config_layer"
depends_on = ["agent6.config", "agent6.config_io", "agent6.paths"]

[[modules]]
path = "agent6.models_cache"
depends_on = ["agent6.config", "agent6.paths", "agent6.providers"]

[[modules]]
path = "agent6.detect"
depends_on = ["agent6.types"]

[[modules]]
path = "agent6.types"
depends_on = []

[[modules]]
path = "agent6.portable"
depends_on = []

[[modules]]
path = "agent6.memory"
depends_on = ["agent6.graph.ulid"]

[[modules]]
path = "agent6.graph"
depends_on = []

[[modules]]
path = "agent6.graph.models"
depends_on = []

[[modules]]
path = "agent6.graph.ulid"
depends_on = []

[[modules]]
path = "agent6.run_id"
depends_on = ["agent6._data", "agent6.graph.ulid"]

[[modules]]
path = "agent6._data"
depends_on = []

[[modules]]
path = "agent6.mcp_server"
depends_on = [
  "agent6",
  "agent6.config",
  "agent6.config_layer",
  "agent6.tools",
  "agent6.graph.storage",
  "agent6.viewmodel",
]

[[modules]]
path = "agent6.graph.storage"
depends_on = ["agent6.graph.models", "agent6.portable"]

[[modules]]
path = "agent6.graph.curator"
depends_on = ["agent6.graph.models", "agent6.graph.storage", "agent6.graph.ulid"]

[[modules]]
path = "agent6.graph.ipc"
depends_on = []

[[modules]]
path = "agent6.graph.client"
depends_on = ["agent6.graph.ipc", "agent6.graph.models"]

[[modules]]
path = "agent6.graph.server"
depends_on = ["agent6.graph.curator", "agent6.graph.ipc", "agent6.graph.models", "agent6.graph.storage"]

[[modules]]
path = "agent6.machine"
depends_on = ["agent6.machine.authoring", "agent6.machine.model", "agent6.machine._semantics", "agent6.machine.graph", "agent6.machine.engine", "agent6.machine.journal", "agent6.machine.dryrun"]

[[modules]]
path = "agent6.machine.authoring"
depends_on = []

[[modules]]
path = "agent6.machine.predicate"
depends_on = []

[[modules]]
path = "agent6.machine.template"
depends_on = ["agent6.machine.predicate"]

[[modules]]
path = "agent6.machine.model"
depends_on = []

[[modules]]
# Load + semantic validation; the cross-cutting rules over the model shapes.
path = "agent6.machine._semantics"
depends_on = ["agent6.machine.model", "agent6.machine.predicate", "agent6.machine.template"]

[[modules]]
path = "agent6.machine.graph"
depends_on = ["agent6.machine.model"]

[[modules]]
# JournalError subclasses MachineError (machine.model), so a broken journal and
# a broken machine file degrade through the same catch sites.
path = "agent6.machine.journal"
depends_on = ["agent6.machine.model", "agent6.portable"]

[[modules]]
path = "agent6.machine.engine"
depends_on = ["agent6.machine.model", "agent6.machine._semantics", "agent6.machine.template", "agent6.machine.predicate", "agent6.machine.journal", "agent6.sandbox", "agent6.types"]

[[modules]]
path = "agent6.machine.dryrun"
depends_on = ["agent6.machine.model", "agent6.machine._semantics", "agent6.machine.template", "agent6.machine.predicate", "agent6.machine.journal", "agent6.machine.engine"]
