# tach module-boundary configuration.
# Enforces the dependency graph declared in the plan.

exclude = [
  "**/.venv/**",
  "**/tests/**",
  "**/target/**",
]
source_roots = ["src"]
exact = true
forbid_circular_dependencies = true

[[modules]]
path = "agent6"
depends_on = []

[[modules]]
# Application pipelines composed over the engine, never a front-end and never
# importing agent6.ui: the run/resume lifecycle and the parallel fan-out /
# coordinator dispatch + candidate-ranking core. The front-end injects the
# presentation, process-spawn, and run-dir bridge callables it needs
# (see app/__init__.py: RunFrontend, LaneRuntime).
path = "agent6.app"
depends_on = [
  "agent6",
  "agent6.budget",
  "agent6.config",
  "agent6.config.layer",
  "agent6.directive",
  "agent6.events",
  "agent6.git_ops",
  "agent6.graph.curator",
  "agent6.graph.storage",
  "agent6.machine",
  "agent6.models.cache",
  "agent6.models.pricing",
  "agent6.models.registry",
  "agent6.models.validate",
  "agent6.paths",
  "agent6.portable",
  "agent6.providers",
  "agent6.runs.ipc",
  "agent6.runs.id",
  "agent6.runs.layout",
  "agent6.runs.lock",
  "agent6.runs.manifest",
  "agent6.sandbox",
  "agent6.sandbox.detect",
  "agent6.secrets",
  "agent6.tools",
  "agent6.tools.schema",
  "agent6.types",
  "agent6.verify_infer",
  "agent6.viewmodel",
  "agent6.workflows",
]

[[modules]]
path = "agent6.ui.cli"
depends_on = [
  "agent6.app",
  "agent6.config",
  "agent6.config.io",
  "agent6.config.layer",
  "agent6.skills",
  "agent6.models.cache",
  "agent6.models.registry",
  "agent6.models.validate",
  "agent6.paths",
  "agent6.secrets",
  "agent6.sandbox.detect",
  "agent6.sandbox",
  "agent6.workflows",
  "agent6.types",
  "agent6.providers", "agent6", "agent6.tools",
  "agent6.tools.schema",
  "agent6.memory",
  "agent6.directive",
  "agent6.budget",
  "agent6.events",
  "agent6.git_ops",
  "agent6.init",
  "agent6.ui.tui",
  "agent6.ui.web",
  "agent6.ui.spawn",
  "agent6.ui.notify",
  "agent6.viewmodel",
  "agent6.graph.models",
  "agent6.graph.storage",
  "agent6.runs.id",
  "agent6.runs.layout",
  "agent6.runs.ipc",
  "agent6.runs.manifest",
  "agent6.ui.mcp_server",
  "agent6.machine",
]

[[modules]]
path = "agent6.workflows"
depends_on = [
  "agent6.prompts",  # pure prompt/template text the loop assembles
  "agent6.tools",
  "agent6.tools.schema",
  "agent6.git_ops",
  "agent6.types",
  "agent6.config",
  "agent6.directive",
  "agent6.providers",
  "agent6.budget",  # loop workflow needs BudgetExceeded
  "agent6.portable",
  "agent6.graph.curator",
  "agent6.graph.models",
  "agent6.memory",  # cross-run memories injected into the system prompt
  "agent6.skills",  # operator-installed skills indexed in the system prompt
]

[[modules]]
path = "agent6.providers"
depends_on = ["agent6.budget"]

[[modules]]
path = "agent6.events"
depends_on = []

[[modules]]
path = "agent6.ui.tui"
depends_on = ["agent6.config", "agent6.config.layer", "agent6.directive", "agent6.ui.spawn", "agent6.ui.notify", "agent6.runs.ipc", "agent6.machine", "agent6.models.cache", "agent6.models.registry", "agent6.models.validate", "agent6.paths", "agent6.secrets", "agent6.viewmodel"]

[[modules]]
# Find the agent6 exe and spawn it detached (new work / machines / background
# resume). Consumed by the CLI, the TUI, and the web server. Pure stdlib leaf.
path = "agent6.ui.spawn"
depends_on = []

[[modules]]
# Best-effort desktop notification via notify-send (fixed argv). Consumed by the
# CLI and the TUI. Pure stdlib leaf.
path = "agent6.ui.notify"
depends_on = []

[[modules]]
# The web UI: a stdlib HTTP server + one embedded page. Renders the shared
# view-model folds (viewmodel), the effective config (config_layer), and the
# conversation (the viewmodel transcript folds), reading run/machine dirs it
# locates via the
# machine spec/journal. The write side drives the frontend bridge. No UI toolkit.
path = "agent6.ui.web"
depends_on = [
  "agent6",
  "agent6.directive",
  "agent6.viewmodel",
  "agent6.ui.spawn",
  "agent6.runs.ipc",
  "agent6.runs.manifest",
  "agent6.config",
  "agent6.config.layer",
  "agent6.machine",
  # config-editor value suggestions: the same model-listing cache + key
  # resolution the TUI config page uses
  "agent6.models.cache",
  # pre-spawn /parallel model validation on the new-work composer
  "agent6.models.validate",
  "agent6.secrets",
]

[[modules]]
# The shared view-model: a run's logs.jsonl folded into RunState, a machine's
# journal folded into MachineState. Consumed by the TUI, the CLI watchers, and
# (later) the web UI. The machine fold reads the journal event types + the spec,
# so it depends on those two leaf machine modules; nothing UI-toolkit-shaped.
path = "agent6.viewmodel"
depends_on = [
  "agent6.config.layer",
  "agent6.machine.journal",
  "agent6.machine.model",
  "agent6.runs.ipc",
  "agent6.runs.manifest",
]

[[modules]]
path = "agent6.init"
depends_on = ["agent6.config.layer", "agent6.verify_infer"]

[[modules]]
path = "agent6.verify_infer"
depends_on = []


[[modules]]
path = "agent6.budget"
depends_on = ["agent6.models.pricing"]

[[modules]]
path = "agent6.models.pricing"
depends_on = ["agent6.paths"]

[[modules]]
path = "agent6.sandbox"
depends_on = [ "agent6.types"]

[[modules]]
path = "agent6.tools"
# Dispatch.py drives the in-process GraphCurator (graph.curator) using the
# graph.models intent types, for the DAG-as-tool handlers (add_task /
# update_task / set_cursor / list_tasks), and the memory store for the
# cross-run memory handlers (add_memory / invalidate_memory).
depends_on = ["agent6.tools.schema", "agent6.sandbox", "agent6.types", "agent6.config", "agent6.events", "agent6.graph.curator", "agent6.graph.models", "agent6.memory", "agent6.skills", "agent6.paths"]

[[modules]]
# graph.models: the update_task/list_tasks status pattern is derived from the
# NodeStatus Literal (one owner for the task-status vocabulary).
path = "agent6.tools.schema"
depends_on = ["agent6.graph.models"]

[[modules]]
path = "agent6.git_ops"
depends_on = ["agent6.types"]

[[modules]]
# The package __init__ re-exports the models as the public API.
path = "agent6.config"
depends_on = ["agent6.config.model"]

[[modules]]
path = "agent6.config.model"
depends_on = ["agent6.budget"]

[[modules]]
path = "agent6.paths"
depends_on = []

[[modules]]
path = "agent6.secrets"
depends_on = ["agent6.paths", "agent6.portable"]

[[modules]]
path = "agent6.config.io"
depends_on = ["agent6.config.model", "agent6.portable"]

[[modules]]
path = "agent6.config.layer"
depends_on = ["agent6.config.model", "agent6.config.io", "agent6.paths"]

[[modules]]
path = "agent6.models.cache"
depends_on = ["agent6.config", "agent6.paths", "agent6.providers"]

[[modules]]
# Curated model capabilities (context windows, compaction sizing, per-model
# prompting defaults); composes the live listing cache for windows the
# bundled table omits.
path = "agent6.models.registry"
depends_on = ["agent6.config", "agent6.models.cache"]

[[modules]]
# Pre-spawn model validation + did-you-mean (configured roles + `/parallel`
# specs), shared by the three front-ends and the coordinator's group
# dispatcher. Cache-first matching via the registry's normalization; a miss
# re-fetches the live listing (secrets: the key for the authed fetch) so a
# refusal never rests on a stale snapshot.
path = "agent6.models.validate"
depends_on = ["agent6.config", "agent6.models.cache", "agent6.models.registry", "agent6.secrets"]

[[modules]]
path = "agent6.sandbox.detect"
depends_on = ["agent6.types"]

[[modules]]
path = "agent6.types"
depends_on = []

[[modules]]
path = "agent6.portable"
depends_on = []

[[modules]]
# The shared `/parallel` grammar (parse + spec), imported by the coordinator
# (workflows) and the composers/CLI (ui). A pure-stdlib leaf both layers sit
# above, so neither side re-implements the syntax and the CLI --parallel value
# grammar stays identical to the directive spec.
path = "agent6.directive"
depends_on = []

[[modules]]
path = "agent6.memory"
depends_on = ["agent6.graph.ulid", "agent6.portable"]

[[modules]]
path = "agent6.skills"
depends_on = []

[[modules]]
# Pure prompt + template text (the strings agent6 sends to models). A leaf: it
# imports nothing from agent6, so the typed assembly that fills these templates
# lives one layer up (workflows/_prompt_blocks, machine/authoring).
path = "agent6.prompts"
depends_on = []

[[modules]]
path = "agent6.graph"
depends_on = []

[[modules]]
path = "agent6.graph.models"
depends_on = []

[[modules]]
path = "agent6.graph.ulid"
depends_on = []

[[modules]]
path = "agent6.runs.id"
depends_on = ["agent6._data", "agent6.graph.ulid"]

[[modules]]
path = "agent6._data"
depends_on = []

[[modules]]
path = "agent6.ui.mcp_server"
depends_on = [
  "agent6",
  "agent6.config",
  "agent6.config.layer",
  "agent6.tools",
  "agent6.graph.storage",
  "agent6.runs.layout",
  "agent6.runs.manifest",
  "agent6.viewmodel",
]

[[modules]]
path = "agent6.runs.layout"
depends_on = []

[[modules]]
# The single manifest.json reader (the writer is app.manifest). A pure leaf:
# app, the viewmodel, and the CLI parse a run's manifest through this one owner.
path = "agent6.runs.manifest"
depends_on = []

[[modules]]
# One authoritative writer per run dir: the worker.lock flock run/resume/fork
# take before touching a run's shared state.
path = "agent6.runs.lock"
depends_on = ["agent6.portable"]

[[modules]]
# The run-dir answer-file contract the workflow process polls and every
# front-end writes (approve / ask_user / steer / stop / compact markers, worker
# pid liveness, detach away-mode). Pure stdlib filesystem primitives; a leaf so
# app, the viewmodel, and the three front-ends all read/write run state without
# a ui edge.
path = "agent6.runs.ipc"
depends_on = []

[[modules]]
path = "agent6.graph.storage"
depends_on = ["agent6.graph.models", "agent6.portable", "agent6.runs.layout"]

[[modules]]
path = "agent6.graph.curator"
depends_on = ["agent6.graph.models", "agent6.graph.storage", "agent6.graph.ulid"]

[[modules]]
path = "agent6.machine"
depends_on = ["agent6.machine.authoring", "agent6.machine.model", "agent6.machine._semantics", "agent6.machine.graph", "agent6.machine.engine", "agent6.machine.journal", "agent6.machine.dryrun"]

[[modules]]
path = "agent6.machine.authoring"
depends_on = ["agent6.prompts"]

[[modules]]
path = "agent6.machine.predicate"
depends_on = []

[[modules]]
path = "agent6.machine.template"
depends_on = ["agent6.machine.predicate"]

[[modules]]
path = "agent6.machine.model"
depends_on = []

[[modules]]
# Load + semantic validation; the cross-cutting rules over the model shapes.
path = "agent6.machine._semantics"
depends_on = ["agent6.machine.model", "agent6.machine.predicate", "agent6.machine.template"]

[[modules]]
path = "agent6.machine.graph"
depends_on = ["agent6.machine.model"]

[[modules]]
# JournalError subclasses MachineError (machine.model), so a broken journal and
# a broken machine file degrade through the same catch sites.
path = "agent6.machine.journal"
depends_on = ["agent6.machine.model", "agent6.portable"]

[[modules]]
path = "agent6.machine.engine"
depends_on = ["agent6.machine.model", "agent6.machine._semantics", "agent6.machine.template", "agent6.machine.predicate", "agent6.machine.journal", "agent6.sandbox", "agent6.types", "agent6.portable"]

[[modules]]
path = "agent6.machine.dryrun"
depends_on = ["agent6.machine.model", "agent6.machine._semantics", "agent6.machine.template", "agent6.machine.predicate", "agent6.machine.journal", "agent6.machine.engine"]
